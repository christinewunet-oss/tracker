<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Hybrid Athlete Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a; --surface: #151515; --surface-2: #1e1e1e;
  --border: #2a2a2a; --border-strong: #3a3a3a;
  --text: #f0f0f0; --text-2: #a0a0a0; --text-3: #707070;
  --accent: #d85a30; --accent-dim: #4a1b0c;
  --ok: #5dcaa5; --warn: #ef9f27; --bad: #e24b4a; --info: #85b7eb;
}
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; line-height: 1.5; overflow-x: hidden; min-height: 100vh; }
body { padding-bottom: 78px; }
.app { max-width: 500px; margin: 0 auto; padding: 16px; }
.hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.hdr h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.hdr .sub { color: var(--text-3); font-size: 13px; }
.pill { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text-2); display: inline-block; }
.pill.accent { background: var(--accent-dim); color: #F5C4B3; border-color: #712B13; }
.pill.ok { background: #0f2a20; color: var(--ok); border-color: #0F6E56; }
.pill.warn { background: #2a1f08; color: var(--warn); border-color: #854F0B; }
.pill.bad { background: #2a0f0f; color: var(--bad); border-color: #791F1F; }
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card .subtitle { color: var(--text-2); font-size: 13px; margin-bottom: 14px; }
.card h3 { font-size: 11px; font-weight: 600; margin: 14px 0 8px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }
.quote-card { background: linear-gradient(135deg, #1a0d07 0%, #0f0f0f 100%); border: 0.5px solid var(--accent-dim); padding: 14px 16px; border-radius: 12px; margin-bottom: 12px; font-style: italic; color: #F5C4B3; font-size: 14px; }
.quote-card .attr { font-style: normal; color: var(--text-3); font-size: 11px; margin-top: 6px; text-align: right; }
.row { display: flex; align-items: center; gap: 10px; }
.row.space { justify-content: space-between; }
.col { display: flex; flex-direction: column; gap: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }
.stat .label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat .value { font-size: 22px; font-weight: 600; margin-top: 2px; }
.stat .trend { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.stat .trend.up { color: var(--ok); } .stat .trend.down { color: var(--bad); }
.prog { background: var(--surface-2); border-radius: 6px; height: 8px; overflow: hidden; margin-top: 6px; }
.prog > div { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.3s; }
.prog.ok > div { background: var(--ok); }
button, .btn { background: var(--surface-2); color: var(--text); border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.1s; -webkit-appearance: none; }
button:active { background: var(--border); transform: scale(0.98); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:active { background: #A14019; }
button.ghost { background: transparent; border-color: var(--border); }
button.small { padding: 6px 10px; font-size: 12px; }
button.danger { color: var(--bad); border-color: #501313; }
button.full { width: 100%; }
input, select, textarea { background: var(--surface-2); color: var(--text); border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit; -webkit-appearance: none; width: 100%; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input[type=number] { font-variant-numeric: tabular-nums; }
label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }
.set-row { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 34px; gap: 6px; align-items: center; margin-bottom: 6px; }
.set-row .idx { color: var(--text-3); font-size: 13px; text-align: center; }
.set-row input { padding: 8px 8px; font-size: 14px; text-align: center; }
.set-row .chk { width: 34px; height: 34px; border-radius: 8px; background: var(--surface-2); border: 0.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.set-row .chk.done { background: var(--ok); border-color: var(--ok); color: #04342C; }
.exercise { padding: 14px 0; border-bottom: 0.5px solid var(--border); }
.exercise:last-child { border-bottom: none; }
.exercise .name { font-size: 15px; font-weight: 600; }
.exercise .target { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.exercise .suggest { font-size: 12px; color: var(--info); margin-top: 4px; background: #042C53; padding: 6px 10px; border-radius: 6px; }
nav.tabs { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid var(--border); display: flex; padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
.tab { flex: 1; text-align: center; padding: 6px 2px; cursor: pointer; color: var(--text-3); font-size: 10px; user-select: none; }
.tab.active { color: var(--accent); }
.tab .ico { width: 22px; height: 22px; margin: 0 auto 2px; display: block; fill: none; stroke: currentColor; stroke-width: 2; }
.food-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 16px; padding: 4px 10px; font-size: 12px; margin-right: 4px; margin-bottom: 4px; cursor: pointer; }
.log-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
.log-item:last-child { border-bottom: none; }
.log-item .nm { font-size: 14px; }
.log-item .mac { font-size: 11px; color: var(--text-3); }
.log-item .rt { text-align: right; }
.log-item .rt .kcal { font-weight: 600; }
.log-item .del { padding: 4px 8px; color: var(--text-3); cursor: pointer; font-size: 18px; }
.chart-wrap { position: relative; height: 160px; margin: 10px 0; }
svg.chart { width: 100%; height: 100%; }
svg.chart .grid { stroke: var(--border); stroke-width: 0.5; }
svg.chart .line { stroke: var(--accent); stroke-width: 2; fill: none; }
svg.chart .pt { fill: var(--accent); }
svg.chart text { fill: var(--text-3); font-size: 10px; }
.plan-sect { margin-bottom: 14px; }
.plan-sect h4 { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.plan-sect p { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
.plan-sect ul { list-style: none; padding-left: 0; }
.plan-sect li { font-size: 13px; color: var(--text-2); padding: 3px 0 3px 16px; position: relative; }
.plan-sect li::before { content: "—"; position: absolute; left: 0; color: var(--text-3); }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 0.5px solid var(--border-strong); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }
.hide { display: none !important; }
.mt { margin-top: 10px; } .mt2 { margin-top: 16px; } .mb { margin-bottom: 10px; }
.muted { color: var(--text-3); font-size: 12px; }
.warn-box { background: #2a1f08; border: 0.5px solid #854F0B; color: var(--warn); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.info-box { background: #0a1d30; border: 0.5px solid #1e4872; color: var(--info); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.num { font-variant-numeric: tabular-nums; }
details { background: var(--surface-2); border-radius: 8px; padding: 0; margin-bottom: 8px; }
summary { padding: 10px 12px; cursor: pointer; font-size: 13px; font-weight: 500; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary::before { content: "+ "; color: var(--text-3); }
details[open] summary::before { content: "− "; }
details > div { padding: 0 12px 12px; font-size: 13px; color: var(--text-2); line-height: 1.6; white-space: pre-line; }
.seg { display: flex; background: var(--surface-2); border-radius: 8px; padding: 3px; border: 0.5px solid var(--border-strong); }
.seg > div { flex: 1; padding: 6px 10px; text-align: center; font-size: 12px; color: var(--text-2); cursor: pointer; border-radius: 6px; }
.seg > div.on { background: var(--accent); color: #fff; }
.date-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.date-nav button { padding: 6px 8px; font-size: 12px; }
.date-nav .date { font-weight: 600; font-size: 14px; flex: 1; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <div id="view-today" class="view"></div>
  <div id="view-lifts" class="view hide"></div>
  <div id="view-food" class="view hide"></div>
  <div id="view-body" class="view hide"></div>
  <div id="view-history" class="view hide"></div>
  <div id="view-plan" class="view hide"></div>
</div>
<nav class="tabs" id="nav-tabs">
  <div class="tab active" data-tab="today"><svg class="ico" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M20 12v6a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Today</div>
  <div class="tab" data-tab="lifts"><svg class="ico" viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M2 12l4-4 4 4-4 4zm20 0l-4-4-4 4 4 4z"/></svg>Lifts</div>
  <div class="tab" data-tab="food"><svg class="ico" viewBox="0 0 24 24"><path d="M3 11h18M5 11V7a7 7 0 0114 0v4M3 11l2 10h14l2-10"/></svg>Food</div>
  <div class="tab" data-tab="body"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2.5"/><path d="M12 8v8M8 22l2-6 2 2 2-2 2 6M8 12h8"/></svg>Body</div>
  <div class="tab" data-tab="history"><svg class="ico" viewBox="0 0 24 24"><path d="M12 8v5l3 2M3 12a9 9 0 109-9 9 9 0 00-7 3.5L3 9"/></svg>History</div>
  <div class="tab" data-tab="plan"><svg class="ico" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 6h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>Plan</div>
</nav>
<div id="toast" class="toast"></div>
<input type="file" id="import-file" class="hide" accept="application/json">
<script>
(function() {
'use strict';

const STORE_KEY = 'hat_data_v5';

function defaultData() {
  return {
    settings: { bodyweight_kg: 57.5, height_cm: 157, age: 22, unit: 'lb',
      kcal_target: 2300, protein_target: 130, carbs_target: 290, fat_target: 60, avg_cycle_days: 28 },
    workouts: {}, food: {}, weight: {}, cycle: {}, notes: {}, runs: {},
    oc_tests: [], oc150_tests: [],
    custom_foods: [
      {name:"Oatmeal 80g dry", kcal:310, p:11, c:55, f:6},
      {name:"Banana (medium)", kcal:105, p:1, c:27, f:0},
      {name:"Peanut butter 1 tbsp", kcal:95, p:4, c:3, f:8},
      {name:"Egg (large)", kcal:72, p:6, c:0, f:5},
      {name:"Chicken breast 100g raw", kcal:110, p:23, c:0, f:2},
      {name:"Chicken thigh 100g raw", kcal:120, p:18, c:0, f:5},
      {name:"White rice 70g dry", kcal:255, p:5, c:56, f:0},
      {name:"Greek yogurt 170g", kcal:100, p:17, c:6, f:0},
      {name:"Whey shake 30g", kcal:120, p:24, c:3, f:2},
      {name:"Avocado half", kcal:160, p:2, c:9, f:15},
      {name:"Almonds 20g", kcal:115, p:4, c:4, f:10},
      {name:"Salmon 100g", kcal:208, p:22, c:0, f:13},
      {name:"Tofu firm 100g", kcal:144, p:17, c:3, f:9},
      {name:"Sweet potato medium", kcal:115, p:2, c:27, f:0},
      {name:"Bread whole grain slice", kcal:80, p:4, c:14, f:1},
      {name:"Milk 250ml (2%)", kcal:122, p:8, c:12, f:5},
      {name:"Tuna canned water 1 can", kcal:110, p:26, c:0, f:1},
      {name:"Cottage cheese 150g", kcal:120, p:18, c:4, f:4},
      {name:"Dumpling (pork, ~1)", kcal:45, p:2, c:5, f:2},
      {name:"Congee bowl plain", kcal:135, p:3, c:29, f:0.5},
      {name:"Stir-fry veg 150g", kcal:70, p:3, c:10, f:3},
    ]
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.settings) parsed.settings = defaultData().settings;
      if (!parsed.settings.unit) parsed.settings.unit = 'lb';
      // One-time migration: first v5 revision defaulted to kg; switch existing users to lb once
      if (!parsed.settings._lb_default_applied) {
        parsed.settings.unit = 'lb';
        parsed.settings._lb_default_applied = true;
      }
      if (!parsed.custom_foods) parsed.custom_foods = defaultData().custom_foods;
      if (!parsed.workouts) parsed.workouts = {};
      if (!parsed.food) parsed.food = {};
      if (!parsed.weight) parsed.weight = {};
      if (!parsed.cycle) parsed.cycle = {};
      if (!parsed.notes) parsed.notes = {};
      if (!parsed.runs) parsed.runs = {};
      if (!parsed.oc_tests) parsed.oc_tests = [];
      if (!parsed.oc150_tests) parsed.oc150_tests = [];
      return parsed;
    }
  } catch(e) { console.error('Load error', e); }
  return defaultData();
}

let DATA = loadData();
function saveData() { try { localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); } catch(e) { toast('Storage error'); } }

function toDisplayWeight(kg) {
  if (kg === null || kg === undefined || isNaN(kg)) return '';
  return DATA.settings.unit === 'lb' ? (kg * 2.20462).toFixed(1) : kg.toFixed(1);
}
function fromDisplayWeight(val) {
  const n = parseFloat(val); if (isNaN(n)) return null;
  return DATA.settings.unit === 'lb' ? n / 2.20462 : n;
}
function unitLabel() { return DATA.settings.unit; }
function toLiftDisplay(kg) {
  if (!kg) return '';
  return DATA.settings.unit === 'lb' ? Math.round(kg * 2.20462 * 2) / 2 : Math.round(kg * 2) / 2;
}
function fromLiftDisplay(val) {
  const n = parseFloat(val); if (isNaN(n)) return null;
  return DATA.settings.unit === 'lb' ? n / 2.20462 : n;
}

function today() { return dateStr(new Date()); }
function dateStr(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return dateStr(d); }
function daysBetween(a, b) { return Math.round((parseDate(b) - parseDate(a)) / 86400000); }
function formatDayMD(d) { return String(d.getMonth()+1) + '/' + String(d.getDate()); }
function toast(msg, ms=1800) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), ms); }

const PHASES = [
  { id: 'p1', start: '2026-04-23', end: '2026-04-29', name: 'P1 · Pre-China calibration', cal: 2300, protein: 130,
    desc: 'Test food tracking. Eat maintenance. 1 gym upper, 1 gym lower, 1 easy run, 1 quality run, 1 mobility. DO NOT start a cut this week.' },
  { id: 'p2', start: '2026-04-30', end: '2026-05-28', name: 'P2 · China (disrupted)', cal: 2200, protein: 120,
    desc: 'Maintenance only. 2–3 full-body sessions + 2–3 runs. Protect strength, protect aerobic base, do not gain fat. Adjust end date when return is known.' },
  { id: 'p3', start: '2026-05-29', end: '2026-07-12', name: 'P3 · Summer DB start', cal: 2350, protein: 135,
    desc: '5 DB + 2 OC + 2 gym + 1 long run + 1 REST. Strength: build slowly. Eat at maintenance. Body will lean out from volume alone.' },
  { id: 'p4', start: '2026-07-13', end: '2026-08-30', name: 'P4 · Marathon build + OC peak prep', cal: 2400, protein: 135,
    desc: 'Long run builds to 24km. OC intervals race-specific. Gym: hold numbers. Add 300 kcal on long run days.' },
  { id: 'p5', start: '2026-08-31', end: '2026-09-27', name: 'P5 · Peak', cal: 2450, protein: 140,
    desc: 'Race-pace OC sets. Long runs 26–30km. Gym drops to 3×5 maintenance. Fuel the work.' },
  { id: 'p6', start: '2026-09-28', end: '2026-10-31', name: 'P6 · Race month', cal: 2400, protein: 140,
    desc: 'Taper. Marathon + selection camp. Carb-load 48h pre-marathon. Eat to perform. Full recovery week after races.' },
  { id: 'p7', start: '2026-11-01', end: '2027-02-28', name: 'P7 · Lean cut', cal: 1850, protein: 145,
    desc: 'NOW the cut. ~400 kcal deficit. 3 lifts + 2 runs/paddle + walk volume. Expect ~0.4 kg/wk. 12–14 weeks to visible leanness.' },
];

function currentPhase() {
  const t = today();
  for (const p of PHASES) { if (t >= p.start && t <= p.end) return p; }
  if (t < PHASES[0].start) return PHASES[0];
  return PHASES[PHASES.length - 1];
}

function sessionForDay(date) {
  const phase = PHASES.find(p => date >= p.start && date <= p.end) || currentPhase();
  const dow = parseDate(date).getDay();
  if (phase.id === 'p1') {
    if (date === '2026-04-23') return 'p1_upper';
    if (date === '2026-04-24') return 'p1_run_easy';
    if (date === '2026-04-25') return 'rest';
    if (date === '2026-04-26') return 'p1_lower';
    if (date === '2026-04-27') return 'p1_run_quality';
    if (date === '2026-04-28') return 'rest';
    if (date === '2026-04-29') return 'p1_mobility';
    return 'rest';
  }
  if (phase.id === 'p2') {
    if (dow === 1) return 'p2_upper';
    if (dow === 2) return 'p2_run_tempo';
    if (dow === 3) return 'p2_lower';
    if (dow === 4) return 'p2_run_easy';
    if (dow === 5) return 'p2_full_body';
    if (dow === 6) return 'p2_run_long';
    return 'rest';
  }
  if (phase.id === 'p3' || phase.id === 'p4') {
    if (dow === 1) return 'summer_mon';
    if (dow === 2) return 'summer_tue';
    if (dow === 3) return 'summer_wed';
    if (dow === 4) return 'summer_thu';
    if (dow === 5) return 'rest_full';
    if (dow === 6) return 'summer_sat';
    if (dow === 0) return 'long_run';
  }
  if (phase.id === 'p5') {
    if (dow === 1) return 'peak_mon';
    if (dow === 2) return 'peak_tue';
    if (dow === 3) return 'summer_wed';
    if (dow === 4) return 'peak_thu';
    if (dow === 5) return 'rest_full';
    if (dow === 6) return 'peak_sat';
    if (dow === 0) return 'long_run';
  }
  if (phase.id === 'p6') return 'race_month';
  if (phase.id === 'p7') {
    if (dow === 1) return 'cut_lower';
    if (dow === 2) return 'cut_z2';
    if (dow === 3) return 'cut_upper_a';
    if (dow === 4) return 'rest';
    if (dow === 5) return 'cut_upper_b';
    if (dow === 6) return 'cut_hiit';
    if (dow === 0) return 'cut_run';
  }
  return 'rest';
}

let VIEWING_DATE = today();

// Infer input type for an exercise: strength | bw | hold | run | time | check
function exerciseType(ex) {
  if (ex.type) return ex.type;
  const n = ex.name.toLowerCase();
  const hint = (ex.hint || '').toLowerCase();
  // Check type: warmups, cooldowns, paddle practice (just a done toggle + notes)
  if (n.includes('warmup') || n.includes('warm-up')) return 'check';
  if (n.includes('cooldown') || n.includes('cool-down')) return 'check';
  if (n.includes('db practice')) return 'check';
  // Hold type: plank, hollow — or any exercise where hint says "seconds"
  if (hint.includes('second')) return 'hold';
  if (n.includes('plank')) return 'hold';
  if (n === 'hollow hold') return 'hold';
  // Run type
  if (n.includes('run') || n.includes('tempo') || n.includes('fartlek')) return 'run';
  // OC time-trial / interval type (OC + distance or × or "test")
  if (n.startsWith('oc ') && /\d+\s*m|×|test/i.test(ex.name)) return 'time';
  // Bodyweight list
  const bwList = ['push-up', 'inverted row', 'cat-cow', 'dead bug', "world's greatest",
                  '90/90', 'thoracic windmill', 'hanging knee raise', 'hanging leg raise',
                  'single-leg hip thrust'];
  // Pull-up (without "weighted") is bw; weighted pull-up is strength
  if (!n.includes('weighted') && n.includes('pull-up')) return 'bw';
  for (const bw of bwList) if (n.includes(bw)) return 'bw';
  return 'strength';
}

function quoteOfDay() {
  const d = new Date();
  const dayNum = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
  return QUOTES[dayNum % QUOTES.length];
}

function lastWeightForExercise(exName) {
  const entries = [];
  for (const date of Object.keys(DATA.workouts)) {
    const w = DATA.workouts[date];
    if (!w.exercises) continue;
    for (const ex of w.exercises) {
      if (ex.name === exName && ex.sets && ex.sets.length) {
        const withWeight = ex.sets.filter(s => s.weight_kg);
        if (!withWeight.length) continue;
        const maxWt = Math.max(...withWeight.map(s => s.weight_kg));
        const doneSets = ex.sets.filter(s => s.done);
        const allDone = ex.sets.length > 0 && ex.sets.every(s => s.done);
        const minReps = doneSets.length ? Math.min(...doneSets.map(s => s.reps || 0)) : 0;
        entries.push({date, weight_kg: maxWt, minReps, allDone});
      }
    }
  }
  entries.sort((a,b) => a.date.localeCompare(b.date));
  return entries[entries.length - 1] || null;
}

function suggestWeight(exName, targetReps) {
  const last = lastWeightForExercise(exName);
  if (!last) return null;
  if (last.allDone && last.minReps >= targetReps) {
    const n = exName.toLowerCase();
    const incKg = n.includes('bench') || n.includes('ohp') || n.includes('overhead') ? 1.25
               : n.includes('squat') || n.includes('deadlift') || n.includes('rdl') || n.includes('hip thrust') ? 2.5
               : n.includes('pull-up') ? 1.25
               : n.includes('row') ? 2.5 : 1.25;
    return { kg: last.weight_kg + incKg, reason: 'last clean — progress' };
  }
  return { kg: last.weight_kg, reason: 'repeat — hit reps first' };
}

function getLiftHistory(name) {
  const out = [];
  for (const date of Object.keys(DATA.workouts).sort()) {
    const w = DATA.workouts[date];
    if (!w.exercises) continue;
    const ex = w.exercises.find(e => e.name === name);
    if (!ex || !ex.sets || ex.sets.length === 0) continue;
    const valid = ex.sets.filter(s => s.weight_kg && s.reps);
    if (valid.length === 0) continue;
    const topSet = valid.reduce((a,b) => (a.weight_kg*a.reps > b.weight_kg*b.reps ? a : b));
    out.push({date, sets: ex.sets, topSet});
  }
  return out;
}

function getWeekSchedule(anchorDate) {
  const out = [];
  const now = anchorDate ? parseDate(anchorDate) : new Date();
  const dayOfWeek = now.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(now);
  monday.setDate(monday.getDate() + mondayOffset);
  const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const ds = dateStr(d);
    const sessionKey = sessionForDay(ds);
    const w = DATA.workouts[ds];
    let status = 'upcoming';
    if (ds === today()) status = 'today';
    else if (ds < today()) {
      if (w && (w.exercises?.some(e => e.sets?.some(s => s.done)) || w.session_note)) status = 'done';
      else if (sessionKey === 'rest' || sessionKey === 'rest_full') status = 'rest';
      else status = 'missed';
    }
    out.push({date: ds, dayLabel: dayLabels[i] + ' · ' + formatDayMD(d), sessionKey, status});
  }
  return out;
}

              <input type="number" inputmode="numeric" step="1" placeholder="reps (target ${ex.reps})" value="${sd.reps||''}" data-action="logSet" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="${s}" data-field="reps">

            </div>`;
          }
        } else if (type === 'hold') {
          for (let s = 0; s < ex.sets; s++) {
            const sd = (logged.sets || [])[s] || {};
            html += `<div class="set-row" style="grid-template-columns:24px 1fr 34px;"><div class="idx">${s+1}</div>
              <input type="number" inputmode="numeric" step="1" placeholder="seconds (target ${ex.reps})" value="${sd.seconds||''}" data-action="logSet" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="${s}" data-field="seconds">
              <div class="chk ${sd.done?'done':''}" data-action="toggleDone" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="${s}">${sd.done?'✓':''}</div>
            </div>`;
          }
        } else if (type === 'run') {
          const sd = (logged.sets || [])[0] || {};
          html += `<div class="set-row" style="grid-template-columns:1fr 1fr 34px;">
            <input type="number" inputmode="decimal" step="0.1" placeholder="km" value="${sd.km||''}" data-action="logSet" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="0" data-field="km">
            <input type="number" inputmode="numeric" step="1" placeholder="min" value="${sd.minutes||''}" data-action="logSet" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="0" data-field="minutes">
            <div class="chk ${sd.done?'done':''}" data-action="toggleDone" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="0">${sd.done?'✓':''}</div>
          </div>`;
          if (sd.km && sd.minutes) {
            const pace = sd.minutes / sd.km;
            const pm = Math.floor(pace);
            const ps = Math.round((pace - pm) * 60);
            html += `<div class="muted mt" style="font-size:11px;">Pace: ${pm}:${String(ps).padStart(2,'0')}/km</div>`;
          }
        } else if (type === 'time') {
          for (let s = 0; s < ex.sets; s++) {
            const sd = (logged.sets || [])[s] || {};
            const timeDisp = sd.seconds !== undefined ? formatTime(sd.seconds) : '';
            html += `<div class="set-row" style="grid-template-columns:24px 1fr 34px;"><div class="idx">${s+1}</div>
              <input type="text" inputmode="decimal" placeholder="time (e.g. 1:10)" value="${timeDisp}" data-action="logSet" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="${s}" data-field="time">
              <div class="chk ${sd.done?'done':''}" data-action="toggleDone" data-date="${date}" data-session="${sessionKey}" data-ex="${exEnc}" data-set="${s}">${sd.done?'✓':''}</div>

    if (session.cooldown) {
      html += `<h3>Cooldown · stretch (do not skip)</h3><details><summary>Cooldown routine (5–8 min)</summary><div>${COOLDOWN[session.cooldown]}</div></details>`;

      <div class="grid2 mb">

function renderWeekRecap() {
  const days = [];
  for (let i = 6; i >= 0; i--) days.push(daysAgo(i));
  let sessionsDone = 0, totalVolume = 0, kmRun = 0, avgKcal = 0, avgProt = 0, kcalDays = 0;
  days.forEach(d => {
    const w = DATA.workouts[d];
    if (w?.exercises?.some(e => e.sets?.some(s => s.done))) sessionsDone++;
    if (w?.exercises) w.exercises.forEach(e => (e.sets||[]).forEach(s => { if (s.done && s.weight_kg && s.reps) totalVolume += s.weight_kg * s.reps; }));
    const food = DATA.food[d];
    if (food && food.length) { avgKcal += food.reduce((s,f) => s + (f.kcal||0), 0); avgProt += food.reduce((s,f) => s + (f.p||0), 0); kcalDays++; }
    const run = DATA.runs[d]; if (run?.km) kmRun += run.km;
  });
  const avgK = kcalDays ? Math.round(avgKcal / kcalDays) : 0;
  const avgP = kcalDays ? Math.round(avgProt / kcalDays) : 0;
  return `<div class="card"><h2>7-day recap</h2><div class="subtitle">Rolling look — progress is measured in weeks.</div>
    <div class="grid2 mt">
      <div class="stat"><div class="label">Sessions</div><div class="value num">${sessionsDone}<span style="font-size:14px;color:var(--text-3)"> done</span></div></div>
      <div class="stat"><div class="label">Volume</div><div class="value num">${Math.round(totalVolume).toLocaleString()}<span style="font-size:14px;color:var(--text-3)"> kg·reps</span></div></div>
      <div class="stat"><div class="label">Running</div><div class="value num">${kmRun.toFixed(1)}<span style="font-size:14px;color:var(--text-3)"> km</span></div></div>
      <div class="stat"><div class="label">Avg kcal / prot</div><div class="value num" style="font-size:15px;">${avgK || '—'} / ${avgP || '—'}g</div><div class="trend">${kcalDays}/7 logged</div></div>
    </div></div>`;
}

function parseTimeString(s) {
  s = String(s).trim();
  if (s.includes(':')) { const [m, sec] = s.split(':'); return parseInt(m) * 60 + parseFloat(sec); }
  if (s.endsWith('s')) s = s.slice(0, -1);
  return parseFloat(s);
}
function formatTime(sec) {
  if (sec === null || isNaN(sec)) return '—';
  const m = Math.floor(sec / 60);
  const s = Math.round(sec - m * 60);
  return m + ':' + String(s).padStart(2, '0');
}

function renderLiftChart(history) {
  if (history.length < 2) return '<div class="muted">Need 2+ sessions for chart.</div>';
  const maxWt = Math.max(...history.map(h => h.topSet.weight_kg));
  const minWt = Math.min(...history.map(h => h.topSet.weight_kg));
  const range = maxWt - minWt || 1;
  const w = 320, h = 120, pad = 24;
  const points = history.map((pt, i) => {
    const x = pad + (i / (history.length - 1)) * (w - 2*pad);
    const y = h - pad - ((pt.topSet.weight_kg - minWt) / range) * (h - 2*pad);
    return `${x},${y}`;
  });
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line class="grid" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"/>
    <line class="grid" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}"/>
    <polyline class="line" points="${points.join(' ')}"/>
    ${points.map(p => { const [x,y] = p.split(','); return `<circle class="pt" cx="${x}" cy="${y}" r="3"/>`; }).join('')}
    <text x="${pad}" y="${pad-4}">${toLiftDisplay(maxWt)} ${unitLabel()}</text>
    <text x="${pad}" y="${h-pad+14}">${toLiftDisplay(minWt)} ${unitLabel()}</text>
  </svg></div>`;
}

function renderBody() {

function renderWeightChart(wts) {
  if (wts.length < 2) return '';
  const vals = wts.map(([_,v]) => v);
  const maxV = Math.max(...vals), minV = Math.min(...vals);
  const range = maxV - minV || 1;
  const w = 320, h = 140, pad = 28;
  const pts = wts.map(([_,v], i) => {
    const x = pad + (i / (wts.length - 1)) * (w - 2*pad);
    const y = h - pad - ((v - minV) / range) * (h - 2*pad);
    return `${x},${y}`;
  });
  return `<div class="chart-wrap"><svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line class="grid" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"/>
    <line class="grid" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}"/>
    <polyline class="line" points="${pts.join(' ')}"/>
    ${pts.map(p => { const [x,y] = p.split(','); return `<circle class="pt" cx="${x}" cy="${y}" r="2.5"/>`; }).join('')}
    <text x="${pad}" y="${pad-4}">${toDisplayWeight(maxV)}${unitLabel()}</text>
    <text x="${pad}" y="${h-pad+14}">${toDisplayWeight(minV)}${unitLabel()}</text>
  </svg></div>`;
}

        <li>Vitamin D3 in Montreal winter (Nov–Mar) if no fatty fish 2×/wk</li>
        <li>Iron — get ferritin tested first. Endurance + period loss = real risk.</li>
        <li>Magnesium 300mg pre-bed in luteal phase if cramps/sleep issues</li>
      </ul></div>
      <div class="plan-sect"><h4>Skip</h4><ul>
        <li>Fat burners, BCAAs, greens powders, pre-workouts, collagen</li>
        <li>Food is the tool. Everything else is marketing.</li>
      </ul></div>
    </div>`;

    document.getElementById('view-plan').innerHTML = html;
  } catch(e) {
    console.error('renderPlan', e);
    document.getElementById('view-plan').innerHTML = `<div class="warn-box">Render error: ${e.message}</div>`;
  }
}

function switchTab(name) {
  try {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.view').forEach(v => v.classList.add('hide'));
    const target = document.getElementById('view-' + name);
    if (target) target.classList.remove('hide');
    renderView(name);
  } catch(e) { console.error('switchTab', e); }
}

function renderView(name) {
  if (name === 'today') renderToday();
  else if (name === 'lifts') renderLifts();
  else if (name === 'food') renderFood();
  else if (name === 'body') renderBody();
  else if (name === 'history') renderHistory();
  else if (name === 'plan') renderPlan();
}

const handlers = {
  logSet(el) {
    const { date, session: sessionKey, ex, set: setIdx, field } = el.dataset;
    const exName = decodeURIComponent(ex);
    if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
    const w = DATA.workouts[date];
    if (!w.exercises) w.exercises = [];
    let exRec = w.exercises.find(e => e.name === exName);
    if (!exRec) { exRec = {name: exName, sets: []}; w.exercises.push(exRec); }
    const idx = parseInt(setIdx);
    while (exRec.sets.length <= idx) exRec.sets.push({});
    if (field === 'weight') {
      exRec.sets[idx].weight_kg = fromLiftDisplay(el.value);
      // auto-mark done when reps already present
      if (exRec.sets[idx].reps > 0 && exRec.sets[idx].weight_kg) exRec.sets[idx].done = true;
    } else if (field === 'km') {
      const n = parseFloat(el.value);
      exRec.sets[idx].km = isNaN(n) ? undefined : n;
      if (!isNaN(n) && n > 0) exRec.sets[idx].done = true;
    } else if (field === 'minutes') {
      const n = parseFloat(el.value);
      exRec.sets[idx].minutes = isNaN(n) ? undefined : n;
    } else if (field === 'seconds') {
      const n = parseInt(el.value);
      exRec.sets[idx].seconds = isNaN(n) ? undefined : n;
      if (!isNaN(n) && n > 0) exRec.sets[idx].done = true;
    } else if (field === 'time') {
      const sec = parseTimeString(el.value);
      exRec.sets[idx].seconds = isNaN(sec) ? undefined : sec;
      if (!isNaN(sec) && sec > 0) exRec.sets[idx].done = true;
    } else {
      const val = parseInt(el.value);
      exRec.sets[idx][field] = isNaN(val) ? undefined : val;
      if (field === 'reps' && val > 0) exRec.sets[idx].done = true;
    }
    saveData();
    if (field === 'reps' || field === 'km' || field === 'seconds' || field === 'time') renderToday();
  },
  toggleDone(el) {
    const { date, session: sessionKey, ex, set: setIdx } = el.dataset;
    const exName = decodeURIComponent(ex);
    if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
    const w = DATA.workouts[date];
    if (!w.exercises) w.exercises = [];
    let exRec = w.exercises.find(e => e.name === exName);
    if (!exRec) { exRec = {name: exName, sets: []}; w.exercises.push(exRec); }
    const idx = parseInt(setIdx);
    while (exRec.sets.length <= idx) exRec.sets.push({});
    exRec.sets[idx].done = !exRec.sets[idx].done;
    saveData();
    renderToday();
  },
  logSessionNote(el) {
    const { date, session: sessionKey } = el.dataset;
    if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
    DATA.workouts[date].session_note = el.value;
    saveData();
  },
  goto(el) { switchTab(el.dataset.target); },
  logWeight() {
    const val = fromDisplayWeight(document.getElementById('wt-input').value);
    if (val === null) return toast('Enter a number');
    DATA.weight[VIEWING_DATE] = val;
    saveData();
    toast('Weight logged');
    renderToday();
  },
  logWeightBody() {
    const val = fromDisplayWeight(document.getElementById('wt-body-input').value);
    if (val === null) return toast('Enter a number');
    DATA.weight[today()] = val;
    saveData();
    toast('Logged');
    renderBody();
  },
  setUnit(el) {
    DATA.settings.unit = el.dataset.val;
    saveData();
    toast('Unit: ' + el.dataset.val);
    renderBody();
  },
  logOC330() {
    const val = document.getElementById('oc-time').value;
    const seconds = parseTimeString(val);
    if (isNaN(seconds) || seconds < 60 || seconds > 300) return toast('Invalid (e.g. 1:54)');
    DATA.oc_tests.push({date: today(), seconds});
    saveData();
    toast('330m logged');
    renderLifts();
  },
  logOC150() {
    const val = document.getElementById('oc150-time').value;
    const seconds = parseFloat(val);
    if (isNaN(seconds) || seconds < 30 || seconds > 120) return toast('Invalid (e.g. 56.5)');
    DATA.oc150_tests.push({date: today(), seconds});
    saveData();
    toast('150m logged');
    renderLifts();
  },
  logRun() {
    const km = parseFloat(document.getElementById('run-km').value);
    const min = parseFloat(document.getElementById('run-min').value);
    const type = document.getElementById('run-type').value;
    if (isNaN(km) || isNaN(min)) return toast('km + minutes required');
    DATA.runs[today()] = {km, minutes: min, type};
    saveData();
    toast('Run logged');
    renderLifts();
  },
  addFood(el) {
    const f = DATA.custom_foods[parseInt(el.dataset.idx)];
    const date = VIEWING_DATE;
    if (!DATA.food[date]) DATA.food[date] = [];
    DATA.food[date].push({...f});
    saveData();
    toast('+ ' + f.name);
    renderFood();
  },
  addCustomFood(el) {
    const savePreset = el.dataset.save === '1';
    const name = document.getElementById('food-name').value.trim();
    const kcal = parseFloat(document.getElementById('food-kcal').value) || 0;
    const p = parseFloat(document.getElementById('food-p').value) || 0;
    const c = parseFloat(document.getElementById('food-c').value) || 0;
    const f = parseFloat(document.getElementById('food-f').value) || 0;
    if (!name || kcal === 0) return toast('Name + kcal required');
    const entry = {name, kcal, p, c, f};
    const date = VIEWING_DATE;
    if (!DATA.food[date]) DATA.food[date] = [];
    DATA.food[date].push(entry);
    if (savePreset) DATA.custom_foods.push(entry);
    saveData();
    ['food-name','food-kcal','food-p','food-c','food-f'].forEach(id => document.getElementById(id).value = '');
    toast('Logged');
    renderFood();
  },
  deleteFood(el) {
    const idx = parseInt(el.dataset.idx);
    const date = VIEWING_DATE;
    DATA.food[date].splice(idx, 1);
    saveData();
    renderFood();
  },
  togglePeriodStart() {
    if (!DATA.cycle[today()]) DATA.cycle[today()] = {};
    DATA.cycle[today()].period_start = !DATA.cycle[today()].period_start;
    if (DATA.cycle[today()].period_start && !DATA.cycle[today()].flow) DATA.cycle[today()].flow = 'medium';
    saveData();
    toast(DATA.cycle[today()].period_start ? 'Period logged' : 'Undone');
    renderBody();
  },
  logCycle(el) {
    const field = el.dataset.field;
    if (!DATA.cycle[today()]) DATA.cycle[today()] = {};
    DATA.cycle[today()][field] = el.value;
    saveData();
  },
  saveReview() {
    const review = {
      sleep: document.getElementById('note-sleep').value,
      bad_session: document.getElementById('note-bad').value,
      pain: document.getElementById('note-pain').value,
      wins: document.getElementById('note-wins').value,
      date: today()
    };
    DATA.notes[today()] = review;
    saveData();
    toast('Review saved');
  },
  exportData() {
    const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hybrid-athlete-' + today() + '.json';
    a.click();
    URL.revokeObjectURL(url);
  },
  importData() { document.getElementById('import-file').click(); },
  editSettings() {
    const s = DATA.settings;
    const kcal = prompt('Daily kcal target', s.kcal_target); if (kcal === null) return;
    const prot = prompt('Daily protein target (g)', s.protein_target); if (prot === null) return;
    const carbs = prompt('Daily carbs target (g)', s.carbs_target); if (carbs === null) return;
    const fat = prompt('Daily fat target (g)', s.fat_target); if (fat === null) return;
    s.kcal_target = parseInt(kcal) || s.kcal_target;
    s.protein_target = parseInt(prot) || s.protein_target;
    s.carbs_target = parseInt(carbs) || s.carbs_target;
    s.fat_target = parseInt(fat) || s.fat_target;
    saveData();
    toast('Updated');
    renderBody();
  },
  resetData() {
    if (!confirm('Wipe ALL data? Export first if unsure.')) return;
    if (!confirm('Really? This is permanent.')) return;
    DATA = defaultData();
    saveData();
    toast('Reset');
    switchTab('today');
  },
  historyStep(el) {
    const step = parseInt(el.dataset.step);
    const d = parseDate(HISTORY_ANCHOR);
    d.setDate(d.getDate() + step);
    HISTORY_ANCHOR = dateStr(d);
    renderHistory();
  },
  historyJump() {
    const val = document.getElementById('history-date-input').value;
    if (val) HISTORY_ANCHOR = val;
    renderHistory();
  },
  historyToday() { HISTORY_ANCHOR = today(); renderHistory(); },
  historyGoto(el) { HISTORY_ANCHOR = el.dataset.date; renderHistory(); },
  dayStep(el) {
    const step = parseInt(el.dataset.step);
    const d = parseDate(VIEWING_DATE);
    d.setDate(d.getDate() + step);
    VIEWING_DATE = dateStr(d);
    const active = document.querySelector('.tab.active')?.dataset.tab || 'today';
    renderView(active);
  },
  dayJump() {
    const val = document.getElementById('day-picker').value;
    if (val) VIEWING_DATE = val;
    const active = document.querySelector('.tab.active')?.dataset.tab || 'today';
    renderView(active);
  },
  dayToday() {
    VIEWING_DATE = today();
    const active = document.querySelector('.tab.active')?.dataset.tab || 'today';
    renderView(active);
  }
};

function handleEvent(ev) {
  let el = ev.target;
  while (el && el !== document.body) {
    if (el.dataset && el.dataset.action) {
      const handler = handlers[el.dataset.action];
      if (handler) { handler(el, ev); return; }
    }
    el = el.parentElement;
  }
}

document.addEventListener('click', handleEvent);
document.addEventListener('change', handleEvent);

document.getElementById('nav-tabs').addEventListener('click', (ev) => {
  const tab = ev.target.closest('.tab');
  if (tab) switchTab(tab.dataset.tab);
});

document.getElementById('import-file').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!confirm('Replace ALL current data?')) return;
      DATA = imported;
      saveData();
      toast('Imported');
      switchTab('today');
    } catch(err) { toast('Invalid file'); }
  };
  reader.readAsText(file);
});

renderToday();
})();
</script>
</body>
</html>
