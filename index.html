<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Hybrid Athlete Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a;
  --surface: #151515;
  --surface-2: #1e1e1e;
  --border: #2a2a2a;
  --border-strong: #3a3a3a;
  --text: #f0f0f0;
  --text-2: #a0a0a0;
  --text-3: #707070;
  --accent: #d85a30;
  --accent-dim: #4a1b0c;
  --ok: #5dcaa5;
  --warn: #ef9f27;
  --bad: #e24b4a;
  --info: #85b7eb;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  min-height: 100vh;
}
body { padding-bottom: 75px; }
.app { max-width: 500px; margin: 0 auto; padding: 16px; }
.hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.hdr h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.hdr .sub { color: var(--text-3); font-size: 13px; }
.pill { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--text-2); display: inline-block; }
.pill.accent { background: var(--accent-dim); color: #F5C4B3; border-color: #712B13; }
.pill.ok { background: #0f2a20; color: var(--ok); border-color: #0F6E56; }
.pill.warn { background: #2a1f08; color: var(--warn); border-color: #854F0B; }
.pill.bad { background: #2a0f0f; color: var(--bad); border-color: #791F1F; }

.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card .subtitle { color: var(--text-2); font-size: 13px; margin-bottom: 14px; }
.card h3 { font-size: 14px; font-weight: 600; margin: 14px 0 8px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; }

.row { display: flex; align-items: center; gap: 10px; }
.row.space { justify-content: space-between; }
.col { display: flex; flex-direction: column; gap: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.stat { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }
.stat .label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.stat .value { font-size: 22px; font-weight: 600; margin-top: 2px; }
.stat .trend { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.stat .trend.up { color: var(--ok); }
.stat .trend.down { color: var(--bad); }

.prog { background: var(--surface-2); border-radius: 6px; height: 8px; overflow: hidden; margin-top: 6px; }
.prog > div { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.3s; }
.prog.ok > div { background: var(--ok); }
.prog.warn > div { background: var(--warn); }

button, .btn {
  background: var(--surface-2); color: var(--text); border: 0.5px solid var(--border-strong);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: background 0.1s; -webkit-appearance: none;
}
button:active { background: var(--border); transform: scale(0.98); }
button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
button.primary:active { background: #A14019; }
button.ghost { background: transparent; border-color: var(--border); }
button.small { padding: 6px 10px; font-size: 12px; }
button.tiny { padding: 4px 8px; font-size: 11px; }
button.danger { color: var(--bad); border-color: #501313; }
button.full { width: 100%; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

input, select, textarea {
  background: var(--surface-2); color: var(--text); border: 0.5px solid var(--border-strong);
  border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit;
  -webkit-appearance: none; width: 100%;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input[type=number] { font-variant-numeric: tabular-nums; }
label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }

.set-row { display: grid; grid-template-columns: 32px 1fr 1fr 1fr 40px; gap: 8px; align-items: center; margin-bottom: 8px; }
.set-row .idx { color: var(--text-3); font-size: 13px; text-align: center; }
.set-row input { padding: 8px 10px; font-size: 14px; text-align: center; }
.set-row .chk {
  width: 36px; height: 36px; border-radius: 8px; background: var(--surface-2);
  border: 0.5px solid var(--border-strong); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px;
}
.set-row .chk.done { background: var(--ok); border-color: var(--ok); color: #04342C; }

.exercise { padding: 14px 0; border-bottom: 0.5px solid var(--border); }
.exercise:last-child { border-bottom: none; }
.exercise .name { font-size: 15px; font-weight: 600; }
.exercise .target { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.exercise .suggest { font-size: 12px; color: var(--info); margin-top: 4px; background: #042C53; padding: 6px 10px; border-radius: 6px; }

nav.tabs {
  position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border); display: flex; padding: 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  z-index: 100;
}
.tab { flex: 1; text-align: center; padding: 8px 4px; cursor: pointer; color: var(--text-3); font-size: 10px; }
.tab.active { color: var(--accent); }
.tab .ico { width: 22px; height: 22px; margin: 0 auto 2px; display: block; fill: none; stroke: currentColor; stroke-width: 2; }

.food-chip {
  display: inline-flex; align-items: center; gap: 4px; background: var(--surface-2);
  border: 0.5px solid var(--border); border-radius: 16px; padding: 4px 10px;
  font-size: 12px; margin-right: 4px; margin-bottom: 4px; cursor: pointer;
}
.food-chip:active { background: var(--border); }

.log-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-item .nm { font-size: 14px; }
.log-item .mac { font-size: 11px; color: var(--text-3); }
.log-item .rt { text-align: right; }
.log-item .rt .kcal { font-weight: 600; }
.log-item .del { padding: 4px 8px; color: var(--text-3); cursor: pointer; font-size: 14px; }

.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-cell { aspect-ratio: 1; background: var(--surface-2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-3); }
.day-cell.done { background: var(--ok); color: #04342C; }
.day-cell.today { border: 1px solid var(--accent); color: var(--accent); }
.day-cell.missed { background: #2a0f0f; color: var(--bad); }

.chart-wrap { position: relative; height: 160px; margin: 10px 0; }
svg.chart { width: 100%; height: 100%; }
svg.chart .grid { stroke: var(--border); stroke-width: 0.5; }
svg.chart .line { stroke: var(--accent); stroke-width: 2; fill: none; }
svg.chart .pt { fill: var(--accent); }
svg.chart text { fill: var(--text-3); font-size: 10px; }

.plan-sect { margin-bottom: 14px; }
.plan-sect h4 { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
.plan-sect p { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
.plan-sect ul { list-style: none; padding-left: 0; }
.plan-sect li { font-size: 13px; color: var(--text-2); padding: 3px 0 3px 16px; position: relative; }
.plan-sect li::before { content: "—"; position: absolute; left: 0; color: var(--text-3); }

.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 0.5px solid var(--border-strong); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
.toast.show { opacity: 1; }

.hide { display: none; }
.mt { margin-top: 10px; }
.mt2 { margin-top: 16px; }
.mb { margin-bottom: 10px; }
.center { text-align: center; }
.muted { color: var(--text-3); font-size: 12px; }
.warn-box { background: #2a1f08; border: 0.5px solid #854F0B; color: var(--warn); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.ok-box { background: #0f2a20; border: 0.5px solid #0F6E56; color: var(--ok); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
.num { font-variant-numeric: tabular-nums; }

details { background: var(--surface-2); border-radius: 8px; padding: 0; margin-bottom: 8px; }
summary { padding: 10px 12px; cursor: pointer; font-size: 13px; font-weight: 500; list-style: none; }
summary::-webkit-details-marker { display: none; }
summary::before { content: "+ "; color: var(--text-3); }
details[open] summary::before { content: "− "; }
details > div { padding: 0 12px 12px; font-size: 13px; color: var(--text-2); line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div id="view-today" class="view"></div>
  <div id="view-lifts" class="view hide"></div>
  <div id="view-food" class="view hide"></div>
  <div id="view-body" class="view hide"></div>
  <div id="view-plan" class="view hide"></div>
</div>

<nav class="tabs">
  <div class="tab active" data-tab="today" onclick="switchTab('today')">
    <svg class="ico" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M20 12v6a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Today
  </div>
  <div class="tab" data-tab="lifts" onclick="switchTab('lifts')">
    <svg class="ico" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l4 4M14 14l4 4M4 12h4M16 12h4"/></svg>
    Lifts
  </div>
  <div class="tab" data-tab="food" onclick="switchTab('food')">
    <svg class="ico" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M6 6l12 12M18 6L6 18"/></svg>
    Food
  </div>
  <div class="tab" data-tab="body" onclick="switchTab('body')">
    <svg class="ico" viewBox="0 0 24 24"><path d="M12 2a3 3 0 100 6 3 3 0 000-6zM6 22v-7h3v7M15 22v-7h3v7M9 15v-4l-3-3M15 15v-4l3-3"/></svg>
    Body
  </div>
  <div class="tab" data-tab="plan" onclick="switchTab('plan')">
    <svg class="ico" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4M3 10h18M5 6h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
    Week
  </div>
</nav>

<div id="toast" class="toast"></div>

<script>
const STORE_KEY = 'hat_data_v1';

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    settings: {
      bodyweight_lb: 127, height_cm: 157, age: 22, unit: 'lb',
      kcal_target: 2250, protein_target: 130, carbs_target: 285, fat_target: 55,
      lifts_baseline: { bench: 110, squat: 120, pullup: 20, rdl: 110, ohp: 60 }
    },
    workouts: {},
    food: {},
    weight: {},
    cycle: {},
    notes: {},
    custom_foods: [
      {name:"Oatmeal 80g dry", kcal:310, p:11, c:55, f:6},
      {name:"Banana (medium)", kcal:105, p:1, c:27, f:0},
      {name:"Peanut butter 1 tbsp", kcal:95, p:4, c:3, f:8},
      {name:"Egg (large)", kcal:72, p:6, c:0, f:5},
      {name:"Chicken thigh 100g raw", kcal:120, p:18, c:0, f:5},
      {name:"White rice 70g dry", kcal:255, p:5, c:56, f:0},
      {name:"Greek yogurt 170g", kcal:100, p:17, c:6, f:0},
      {name:"Whey shake 30g", kcal:120, p:24, c:3, f:2},
      {name:"Avocado half", kcal:160, p:2, c:9, f:15},
      {name:"Almonds 20g", kcal:115, p:4, c:4, f:10},
      {name:"Salmon 100g", kcal:208, p:22, c:0, f:13},
      {name:"Tofu firm 100g", kcal:144, p:17, c:3, f:9},
      {name:"Sweet potato medium", kcal:115, p:2, c:27, f:0},
      {name:"Bread whole grain slice", kcal:80, p:4, c:14, f:1},
      {name:"Milk 250ml (2%)", kcal:122, p:8, c:12, f:5},
      {name:"Tuna canned water 1 can", kcal:110, p:26, c:0, f:1}
    ]
  };
}

function saveData() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }
  catch(e) { toast('Storage error — data may not save'); }
}

let DATA = loadData();

function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return dateStr(d);
}

function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function currentPhase() {
  const t = today();
  if (t < '2026-04-26') return 'phase_1';
  if (t < '2026-05-21') return 'phase_2';
  if (t < '2026-07-07') return 'phase_3';
  if (t < '2026-08-25') return 'phase_4';
  if (t < '2026-09-29') return 'phase_5';
  if (t < '2026-11-01') return 'phase_6';
  return 'phase_7';
}

function phaseInfo(p) {
  return ({
    phase_1: {name: 'Phase 1 — Pre-China fix', end: '2026-04-25', cal: 2250, desc: 'Rest of this week. Quality sessions, full calories.'},
    phase_2: {name: 'Phase 2 — China travel', end: '2026-05-21', cal: 2100, desc: 'Maintenance. 3x/week full body. Walk daily.'},
    phase_3: {name: 'Phase 3 — DB adaptation + strength', end: '2026-07-06', cal: 2285, desc: 'Hit strength targets while absorbing paddle load.'},
    phase_4: {name: 'Phase 4 — DB peak + marathon base', end: '2026-08-24', cal: 2300, desc: 'Build long run, hold strength.'},
    phase_5: {name: 'Phase 5 — Race peak', end: '2026-09-28', cal: 2350, desc: 'Maximum fitness, begin taper.'},
    phase_6: {name: 'Phase 6 — Race month', end: '2026-10-31', cal: 2400, desc: 'Taper, marathon, selection camp. Fuel to race.'},
    phase_7: {name: 'Phase 7 — Aesthetic cut', end: '2027-02-28', cal: 1850, desc: 'Deficit 350 kcal. Reveal physique.'}
  })[p];
}

function sessionForDay(date) {
  const phase = currentPhase();
  const d = parseDate(date);
  const dow = d.getDay();

  if (phase === 'phase_1') {
    if (date === '2026-04-23') return 'p1_upper';
    if (date === '2026-04-24') return 'p1_run';
    if (date === '2026-04-25') return 'rest';
    if (date === '2026-04-26') return 'p1_lower';
    return 'rest';
  }
  if (phase === 'phase_2') {
    if (dow === 1) return 'p2_upper';
    if (dow === 4) return 'p2_lower';
    if (dow === 6) return 'p2_cond';
    return 'rest';
  }
  if (phase === 'phase_3') {
    if (dow === 1) return 'db_double';
    if (dow === 2) return 'oc_intervals_am_upper_pm';
    if (dow === 3) return 'db_practice';
    if (dow === 4) return 'db_practice';
    if (dow === 5) return 'lower';
    if (dow === 6) return 'db_am_oc_pm';
    if (dow === 0) return 'rest_or_upper_b_light';
  }
  if (phase === 'phase_4') {
    if (dow === 1) return 'db_double';
    if (dow === 2) return 'oc_intervals_am_upper_pm';
    if (dow === 3) return 'db_practice';
    if (dow === 4) return 'db_practice';
    if (dow === 5) return 'lower';
    if (dow === 6) return 'db_am_oc_pm';
    if (dow === 0) return 'long_run';
  }
  if (phase === 'phase_5') {
    if (dow === 1) return 'db_double';
    if (dow === 2) return 'oc_race_pace_am_upper_pm';
    if (dow === 3) return 'db_practice';
    if (dow === 4) return 'tempo_or_oc_test';
    if (dow === 5) return 'lower_light';
    if (dow === 6) return 'db_am_oc_race_pm';
    if (dow === 0) return 'long_run';
  }
  if (phase === 'phase_6') {
    return 'race_taper';
  }
  if (phase === 'phase_7') {
    if (dow === 1) return 'cut_lower';
    if (dow === 2) return 'cut_z2';
    if (dow === 3) return 'cut_upper_a';
    if (dow === 4) return 'rest';
    if (dow === 5) return 'cut_upper_b';
    if (dow === 6) return 'cut_hiit';
    if (dow === 0) return 'cut_run';
  }
  return 'rest';
}

const SESSIONS = {
  p1_upper: {
    name: 'Upper — Strength + finisher',
    duration: 60,
    warmup: '3min row → band pull-aparts ×15 → dislocates ×10 → push-up ×10 → empty bar ×10 → 90lb ×5 → 100lb ×3',
    exercises: [
      {name:'Bench press', sets:5, reps:5, progression:'linear', hint:'Target 115lb if 110lb was clean last cycle'},
      {name:'Weighted pull-up', sets:4, reps:4, progression:'linear', hint:'Target +22.5lb if +20lb was clean'},
      {name:'Standing OHP', sets:3, reps:6},
      {name:'Single-arm DB row', sets:3, reps:10, hint:'Per arm'},
      {name:'Incline DB press', sets:3, reps:10},
      {name:'Face pulls', sets:3, reps:15}
    ],
    finisher: '8-min AMRAP: 10 DB thrusters → 10 renegade rows (5/side) → 15 hanging knee raises → 10 push-ups. LOG YOUR ROUNDS.'
  },
  p1_run: {
    name: 'Interval run',
    duration: 45,
    warmup: '5min easy + A-skips/high-knees + 4×20s strides',
    exercises: [
      {name:'6×800m @ 5k pace', sets:6, reps:1, hint:'Target 4:00-4:10 per 800. 2min walk between.'}
    ],
    finisher: '3 rounds 45s work/15s rest: hollow hold → side plank L → side plank R → hanging leg raises'
  },
  p1_lower: {
    name: 'Lower — Strength + finisher',
    duration: 55,
    warmup: '3min bike → leg swings → bodyweight squat ×15 → glute bridge ×15 → walking lunge ×10/leg → empty bar ×10 → 90lb ×5',
    exercises: [
      {name:'Back squat', sets:5, reps:5, progression:'linear', hint:'Establish ceiling — start 110lb, push higher if clean'},
      {name:'Romanian deadlift', sets:4, reps:6, hint:'Start 110lb, push to 120 if clean'},
      {name:'Bulgarian split squat', sets:3, reps:8, hint:'Per leg, 25lb DBs'},
      {name:'Barbell hip thrust', sets:3, reps:10},
      {name:'Standing calf raise', sets:3, reps:15}
    ],
    finisher: '4 rounds: 40m farmer carry (45lb DBs) → 15 goblet squats (35lb) → 10 DB RDLs → 30s plank'
  },
  p2_upper: {
    name: 'Upper body (travel)',
    duration: 45,
    warmup: '5min + band pull-aparts + push-up ×10',
    exercises: [
      {name:'Bench press or DB bench', sets:5, reps:5, hint:'85% of home max — maintain not PR'},
      {name:'Weighted pull-up', sets:4, reps:4, hint:'Volume work, not max'},
      {name:'DB row', sets:4, reps:8, hint:'Per arm'},
      {name:'DB overhead press', sets:3, reps:8},
      {name:'Face pulls (band)', sets:3, reps:15},
      {name:'Hanging leg raise', sets:3, reps:10}
    ]
  },
  p2_lower: {
    name: 'Lower body (travel)',
    duration: 45,
    warmup: '5min bike + leg swings + bodyweight squat ×15',
    exercises: [
      {name:'Squat (goblet if no barbell)', sets:5, reps:5, hint:'85% intensity'},
      {name:'Romanian deadlift', sets:4, reps:6},
      {name:'Bulgarian split squat', sets:3, reps:8},
      {name:'Hip thrust', sets:3, reps:10},
      {name:'Standing calf raise', sets:3, reps:15},
      {name:'Pallof press (band)', sets:3, reps:10}
    ]
  },
  p2_cond: {
    name: 'Conditioning (travel)',
    duration: 30,
    warmup: '5min easy jog',
    exercises: [
      {name:'Choose: 30-45min Z2 run OR 20min fartlek (1on/1off ×10)', sets:1, reps:1}
    ]
  },
  upper_a: {
    name: 'Upper A — Bench focus',
    duration: 60,
    warmup: '3min row → band pull-aparts ×15 → dislocates ×10 → scap pull-ups ×8 → push-up ×10 → bar bench ×10 → 90lb ×5',
    exercises: [
      {name:'Bench press', sets:5, reps:5, progression:'linear'},
      {name:'Overhead press (barbell)', sets:4, reps:6},
      {name:'Incline DB press', sets:3, reps:10},
      {name:'Pendlay row', sets:4, reps:6},
      {name:'Face pulls', sets:3, reps:15},
      {name:'Pallof press', sets:3, reps:10},
      {name:'Hanging knee raise', sets:3, reps:12}
    ]
  },
  upper_b: {

function lastWeightForExercise(exName) {
  const entries = [];
  for (const date of Object.keys(DATA.workouts)) {
    const w = DATA.workouts[date];
    if (!w.exercises) continue;
    for (const ex of w.exercises) {
      if (ex.name === exName && ex.sets && ex.sets.length) {
        const maxWt = Math.max(...ex.sets.filter(s=>s.weight).map(s=>s.weight));
        const minReps = Math.min(...ex.sets.filter(s=>s.done).map(s=>s.reps || 0));
        const allDone = ex.sets.every(s => s.done);
        entries.push({date, weight: maxWt, minReps, allDone, sets: ex.sets});
      }
    }
  }
  entries.sort((a,b) => a.date.localeCompare(b.date));
  return entries[entries.length - 1] || null;
}

function suggestWeight(exName, targetSets, targetReps) {
  const last = lastWeightForExercise(exName);
  if (!last) return null;
  if (last.allDone && last.minReps >= targetReps) {
    const n = exName.toLowerCase();
    const inc = n.includes('bench') || n.includes('overhead') || n.includes('ohp') ? 2.5 :
                n.includes('squat') || n.includes('deadlift') || n.includes('rdl') ? 5 :
                n.includes('pull-up') ? 2.5 :
                n.includes('row') ? 5 : 2.5;
    return { weight: last.weight + inc, reason: 'last session clean — progress' };
  }
  return { weight: last.weight, reason: 'last session missed reps — repeat' };
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.add('hide'));
  document.getElementById('view-' + name).classList.remove('hide');
  renderView(name);
}

function renderView(name) {
  if (name === 'today') renderToday();
  else if (name === 'lifts') renderLifts();
  else if (name === 'food') renderFood();
  else if (name === 'body') renderBody();
  else if (name === 'plan') renderPlan();
}

function lastNDaysConsistency(n) {
  const out = [];
  const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const ds = dateStr(d);
    const letter = ['S','M','T','W','T','F','S'][d.getDay()];
    const expectedSession = sessionForDay(ds);
    const w = DATA.workouts[ds];
    let status = '';
    if (ds === today()) status = 'today';
    else if (expectedSession === 'rest') status = '';
    else if (w && (w.exercises?.some(e => e.sets.some(s => s.done)) || w.session_note || w.finisher_note)) status = 'done';
    else if (ds < today()) status = 'missed';
    out.push({date: ds, letter, status});
  }
  return out;
}

function getWeekSchedule() {
  const out = [];
  const now = new Date();
  const dayOfWeek = now.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(now);
  monday.setDate(monday.getDate() + mondayOffset);

  const dayLabels = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    const ds = dateStr(d);
    const sessionKey = sessionForDay(ds);
    const w = DATA.workouts[ds];
    let status = 'upcoming';
    if (ds === today()) status = 'today';
    else if (ds < today()) {
      if (w && (w.exercises?.some(e => e.sets.some(s => s.done)) || w.session_note || w.finisher_note)) status = 'done';
      else if (sessionKey !== 'rest') status = 'missed';
      else status = 'rest';
    }
    const monthDay = String(d.getMonth()+1) + '/' + String(d.getDate());
    out.push({date: ds, dayLabel: dayLabels[i] + ' · ' + monthDay, sessionKey, status});
  }
  return out;
}

function logSet(date, sessionKey, exName, setIdx, field, value) {
  if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
  const w = DATA.workouts[date];
  if (!w.exercises) w.exercises = [];
  let ex = w.exercises.find(e => e.name === exName);
  if (!ex) { ex = {name: exName, sets: []}; w.exercises.push(ex); }
  while (ex.sets.length <= setIdx) ex.sets.push({});
  const val = field === 'weight' ? parseFloat(value) : parseInt(value);
  ex.sets[setIdx][field] = isNaN(val) ? undefined : val;
  if (field === 'reps' && val) ex.sets[setIdx].done = true;
  saveData();
  if (field === 'reps' && val) renderToday();
}

function toggleSetDone(date, sessionKey, exName, setIdx) {
  if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
  const w = DATA.workouts[date];
  if (!w.exercises) w.exercises = [];
  let ex = w.exercises.find(e => e.name === exName);
  if (!ex) { ex = {name: exName, sets: []}; w.exercises.push(ex); }
  while (ex.sets.length <= setIdx) ex.sets.push({});
  ex.sets[setIdx].done = !ex.sets[setIdx].done;
  saveData();
  renderToday();
}

function logFinisher(date, val) {
  if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionForDay(date), exercises: []};
  DATA.workouts[date].finisher_note = val;
  saveData();
}

function logSessionNote(date, sessionKey, val) {
  if (!DATA.workouts[date]) DATA.workouts[date] = {session: sessionKey, exercises: []};
  DATA.workouts[date].session_note = val;
  saveData();
}

function logWeight() {
  const val = parseFloat(document.getElementById('wt-input').value);
  if (isNaN(val)) return toast('Enter a number');
  DATA.weight[today()] = val;
  saveData();
  toast('Weight logged');
  renderToday();
}

function getLiftHistory(name) {
  const out = [];
  for (const date of Object.keys(DATA.workouts).sort()) {
    const w = DATA.workouts[date];
    if (!w.exercises) continue;
    const ex = w.exercises.find(e => e.name === name);
    if (!ex || !ex.sets || ex.sets.length === 0) continue;
    const valid = ex.sets.filter(s => s.weight && s.reps);
    if (valid.length === 0) continue;
    const topSet = valid.reduce((a,b) => (a.weight*a.reps > b.weight*b.reps ? a : b));
    out.push({date, sets: ex.sets, topSet});
  }
  return out;
}

function getOCTestHistory() {
  if (!DATA.oc_tests) DATA.oc_tests = [];
  return [...DATA.oc_tests].sort((a,b) => a.date.localeCompare(b.date));
}

function getOC150History() {
  if (!DATA.oc150_tests) DATA.oc150_tests = [];
  return [...DATA.oc150_tests].sort((a,b) => a.date.localeCompare(b.date));
}

function parseTimeString(s) {
  s = s.trim();
  if (s.includes(':')) {
    const [m, sec] = s.split(':');
    return parseInt(m) * 60 + parseFloat(sec);
  }
  if (s.endsWith('s')) s = s.slice(0, -1);
  return parseFloat(s);
}

function formatTime(sec) {
  if (sec === null || isNaN(sec)) return '—';
  const m = Math.floor(sec / 60);
  const s = Math.round(sec - m * 60);
  return m + ':' + String(s).padStart(2, '0');
}

function logOCTest() {
  const val = document.getElementById('oc-time').value;
  const seconds = parseTimeString(val);
  if (isNaN(seconds) || seconds < 60 || seconds > 300) return toast('Invalid time (e.g. 1:58 or 118)');
  if (!DATA.oc_tests) DATA.oc_tests = [];
  DATA.oc_tests.push({date: today(), seconds});
  saveData();
  toast('330m test logged');
  renderLifts();
}

function logOC150Test() {
  const val = document.getElementById('oc150-time').value;
  const seconds = parseFloat(val);
  if (isNaN(seconds) || seconds < 30 || seconds > 120) return toast('Invalid time (e.g. 56.5)');
  if (!DATA.oc150_tests) DATA.oc150_tests = [];
  DATA.oc150_tests.push({date: today(), seconds});
  saveData();
  toast('150m test logged');
  renderLifts();
}

function renderLiftChart(history) {
  if (history.length < 2) return '<div class="muted">Need 2+ sessions for chart.</div>';
  const maxWt = Math.max(...history.map(h => h.topSet.weight));
  const minWt = Math.min(...history.map(h => h.topSet.weight));
  const range = maxWt - minWt || 1;
  const w = 320, h = 120, pad = 20;
  const points = history.map((pt, i) => {
    const x = pad + (i / (history.length - 1)) * (w - 2*pad);
    const y = h - pad - ((pt.topSet.weight - minWt) / range) * (h - 2*pad);
    return `${x},${y}`;
  });
  return `
    <div class="chart-wrap">
      <svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <line class="grid" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"/>
        <line class="grid" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}"/>
        <polyline class="line" points="${points.join(' ')}"/>
        ${points.map(p => { const [x,y] = p.split(','); return `<circle class="pt" cx="${x}" cy="${y}" r="3"/>`; }).join('')}
        <text x="${pad}" y="${pad-4}">${maxWt} lbs</text>
        <text x="${pad}" y="${h-pad+14}">${minWt} lbs</text>
      </svg>
    </div>
  `;
}

function renderWeightChart(wts) {
  if (wts.length < 2) return '';
  const vals = wts.map(([_,v]) => v);
  const maxV = Math.max(...vals), minV = Math.min(...vals);
  const range = maxV - minV || 1;
  const w = 320, h = 140, pad = 24;
  const pts = wts.map(([_,v], i) => {
    const x = pad + (i / (wts.length - 1)) * (w - 2*pad);
    const y = h - pad - ((v - minV) / range) * (h - 2*pad);
    return `${x},${y}`;
  });
  return `
    <div class="chart-wrap">
      <svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <line class="grid" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"/>
        <line class="grid" x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}"/>
        <polyline class="line" points="${pts.join(' ')}"/>
        ${pts.map(p => { const [x,y] = p.split(','); return `<circle class="pt" cx="${x}" cy="${y}" r="2.5"/>`; }).join('')}
        <text x="${pad}" y="${pad-4}">${maxV.toFixed(1)}kg</text>
        <text x="${pad}" y="${h-pad+14}">${minV.toFixed(1)}kg</text>
      </svg>
    </div>
  `;
}

function saveReview() {

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hybrid-athlete-tracker-' + today() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!confirm('Replace all current data with imported file?')) return;
      DATA = imported;
      saveData();
      toast('Imported');
      renderView(document.querySelector('.tab.active').dataset.tab);
    } catch(err) {
      toast('Invalid file');
    }
  };
  reader.readAsText(file);
}

            <div style="font-size: 12px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em;">${d.dayLabel}${isToday ? ' · today' : ''}</div>
            <div style="font-weight: 500; margin-top: 2px; color: ${statusColor}">${sessionData.name}</div>
            ${sessionData.duration ? `<div class="muted" style="font-size: 12px;">${sessionData.duration} min${d.sessionKey === 'oc_intervals_am_upper_pm' || d.sessionKey === 'oc_race_pace_am_upper_pm' ? ' · AM water + PM gym' : ''}</div>` : ''}
          </div>
          ${isDone ? '<span class="pill ok">done</span>' : isToday ? '<span class="pill accent">today</span>' : ''}
        </div>
      </div>`;
  });

  html += `</div>`;

  html += `
    <div class="card">
      <h2>Current phase</h2>
      <div class="subtitle">${pi.name} · ends ${pi.end}</div>
      <p class="muted">${pi.desc}</p>
    </div>
  `;

  html += `
    <div class="card">
      <h2>Strength targets by phase-end</h2>
      <div class="plan-sect">
        <h4>Phase 3 (Jul 6, 2026)</h4>
        <ul>
          <li>Bench press 5RM: 125 lbs</li>
          <li>Back squat 5RM: 155 lbs</li>
          <li>Weighted pull-up 5RM: +25 lbs</li>
          <li>Romanian deadlift 5RM: 155 lbs</li>
          <li>Overhead press 5RM: 75 lbs</li>
          <li>10k run: sub-58 min</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>Phase 4 (Aug 24, 2026)</h4>
        <ul>
          <li>Bench 135 lbs × 5 (1.07× BW)</li>
          <li>Squat 165 lbs × 5 (1.3× BW)</li>
          <li>Weighted pull-up +35 lbs × 5</li>
          <li>24 km long run completed</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>October — Race month</h4>
        <ul>
          <li>Marathon: 4:00-4:15 target, 4:30 backstop</li>
          <li>Selection camp: paddle times at club standard</li>
          <li>Hold, don't build</li>
        </ul>
      </div>
    </div>
  `;

  html += `
    <div class="card">
      <h2>Long run schedule (Phase 4+)</h2>
      <details><summary>Phase 4 (Jul 7 – Aug 24)</summary><div>
        Week 1 Jul 7-13: 14km<br>Week 2: 16km<br>Week 3: 18km<br>Week 4 cutback: 12km<br>
        Week 5: 20km<br>Week 6: 22km<br>Week 7: 24km<br><br>
        All conversational pace (6:45-7:15/km).
      </div></details>
      <details><summary>Phase 5 (Aug 25 – Sep 28)</summary><div>
        Week 1: 26km<br>Week 2: 28km<br>Week 3 cutback: 20km<br>Week 4: 30km<br>Week 5: 22km (taper begins)
      </div></details>
      <details><summary>Race taper (Phase 6)</summary><div>
        2 weeks pre-race: 16km long run.<br>
        Race week: 10km long Sunday before.<br>
        Skip lifts race week. Carb load Fri+Sat.
      </div></details>
    </div>

    <div class="card">
      <h2>Red flags</h2>
      <div class="plan-sect">
        <h4>STOP if any of these happen</h4>
        <ul>
          <li>Period irregular or absent &gt;35 days: add 300 kcal/day, cut volume 25%</li>
          <li>Weight dropping &gt;0.7 kg/week avg over 2 weeks: you're losing muscle</li>
          <li>Same lift regresses 2 weeks in a row with good sleep: under-recovered</li>
          <li>Resting HR +5 bpm above baseline for 3+ days: deload</li>
          <li>Pain (sharp, localized) not resolving in 48h: rest + physio</li>
          <li>Sleep &lt;6.5h avg for 2 weeks: cut training not food</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>Execution triage when life breaks</h2>
      <div class="plan-sect">
        <ul>
          <li>Can only do 1 thing → Paddle</li>
          <li>Can do 2 → Paddle + sleep 8h</li>
          <li>Can do 3 → + protein target</li>
          <li>Can do 4 → + 1 lift OR 1 long run</li>
        </ul>
        <p class="muted mt">Never voluntarily skip a paddle through October.</p>
      </div>
    </div>

    <div class="card">
      <h2>Nutrition by phase</h2>
      <div class="plan-sect">
        <ul>
          <li>Phase 1-2: 2100-2250 kcal · 125g protein</li>
          <li>Phase 3: 2285 kcal · 130g · 285g carbs</li>
          <li>Phase 4: 2300 kcal · 130g · +300 on long run days</li>
          <li>Phase 5: 2350 kcal · 135g · same</li>
          <li>Phase 6: Fuel to perform, carb-load 48h pre-marathon</li>
          <li>Phase 7: 1850 kcal · 145g protein · deficit 350</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>OC training plan</h2>
      <div class="subtitle">330m selection test — realistic 1:53 · stretch 1:50</div>
      <div class="plan-sect">
        <h4>Weekly structure (Phase 3+)</h4>
        <ul>
          <li>Tue AM: OC intervals — lactate tolerance (6×200m at 330m pace)</li>
          <li>Sat PM: OC race-specific — 330m tests, 150m sprints</li>
          <li>Sun (optional): OC technical — 45-60min steady, focus on catch & rotation</li>
          <li>Target: 2-3 OC sessions/week</li>
        </ul>
        <p class="muted mt">Key rule: Never schedule OC intervals or sprint work the day before a DB practice — you need fresh arms.</p>
      </div>
      <div class="plan-sect">
        <h4>3 energy systems for 330m</h4>
        <ul>
          <li>Alactic (first 10s): 150m sprints max effort, full rest</li>
          <li>Lactic (10s-2min): 6×200m at 330m pace, 2min rest — main stimulus</li>
          <li>Aerobic capacity: steady Z2 paddles 30-45min</li>
        </ul>
        <p class="muted mt">Your 1:57-2:07 range means lactic system is the limiter. That's what Tuesday intervals target.</p>
      </div>
      <div class="plan-sect">
        <h4>Testing protocol</h4>
        <ul>
          <li>Full 330m time trial every 2 weeks</li>
          <li>Always after 10min warmup + 3 short builds</li>
          <li>Calm water when possible</li>
          <li>Log in Lifts tab</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>Progression expectations</h4>
        <ul>
          <li>2:07 → 2:00: achievable in 4-6 weeks with quality intervals</li>
          <li>2:00 → 1:55: 6-8 more weeks, last 5s are hardest</li>
          <li>1:55 → 1:50: requires perfect execution, strength gains translating, good conditions</li>
          <li>Don't time-trial every session — burnout risk</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>OC overtraining red flags</h4>
        <ul>
          <li>Forearm tendinitis or grip drop → reduce pull-up/row volume</li>
          <li>Shoulder niggles → check catch technique, more face pulls</li>
          <li>Lower back fatigue → reduce RDL weight, more Pallof press</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>Cycle notes</h2>
      <div class="plan-sect">
        <ul>
          <li>Days 1-2 of period: if bad cramps, -15% top set. Otherwise train normal.</li>
          <li>Mid-luteal (days 21-26): hydrate more, +150 kcal/day, magnesium 300mg before bed.</li>
          <li>Do NOT rearrange the whole week around phases — track & adjust only.</li>
          <li>Missing period = RED FLAG. See above.</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>Supplements (minimal)</h2>
      <div class="plan-sect">
        <h4>Only supplement</h4>
        <ul>
          <li>Creatine monohydrate 5g daily — any time, with water. Skip loading.</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>Get from whole foods instead</h4>
        <ul>
          <li>Protein → eggs, chicken thighs, fish, tofu, Greek yogurt, cottage cheese</li>
          <li>Vitamin D → salmon/sardines 2x/wk, egg yolks, fortified milk</li>
          <li>Magnesium → almonds, spinach, pumpkin seeds, dark chocolate, black beans</li>
          <li>Omega-3 → salmon, sardines, walnuts, chia/flax seeds</li>
          <li>Iron → red meat, lentils, chickpeas, spinach + vitamin C pairing</li>
        </ul>
      </div>
      <div class="plan-sect">
        <h4>Watch-outs for Montreal winters</h4>
        <ul>
          <li>Vitamin D from sun = near-zero Nov-March. If not eating fatty fish 2x/wk, consider D3 only in winter.</li>
          <li>Iron loss from menstruation + endurance training is real. If chronic fatigue, get ferritin tested before assuming food is enough.</li>
        </ul>
      </div>
    </div>
  `;

  document.getElementById('view-plan').innerHTML = html;
}

renderToday();

if (!DATA.settings._first_open) {
  DATA.settings._first_open = today();
  saveData();
}
</script>
